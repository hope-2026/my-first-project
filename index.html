<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>GPT Chat</title>
<style>
:root {
  --bg: #ffffff;
  --bg-soft: #f8fafc;
  --bg-input: #f1f5f9;
  --text: #1e293b;
  --text-dim: #64748b;
  --text-muted: #94a3b8;
  --accent: #14b8a6;
  --accent-soft: #ccfbf1;
  --user-bg: #a855f7;
  --user-text: #ffffff;
  --ai-bg: #ffffff;
  --ai-border: #e2e8f0;
  --border: #e2e8f0;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --danger: #ef4444;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f172a;
    --bg-soft: #1e293b;
    --bg-input: #334155;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --text-muted: #64748b;
    --accent: #2dd4bf;
    --accent-soft: #134e4a;
    --user-bg: #a855f7;
    --user-text: #ffffff;
    --ai-bg: #1e293b;
    --ai-border: #334155;
    --border: #334155;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

.topbar { padding: 12px 16px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.menu-btn { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; padding: 4px; }
.topbar-title { font-size: 17px; font-weight: 700; color: var(--accent); }
.model-select { flex: 1; padding: 10px 14px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 14px; cursor: pointer; }
.settings-btn { background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; padding: 4px; }

.chat-area { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: var(--text-muted); }
.welcome-logo { font-size: 42px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.welcome-sub { font-size: 15px; line-height: 1.5; }

.message { margin-bottom: 16px; display: flex; flex-direction: column; animation: fadeIn 0.25s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.message.user { align-items: flex-end; }
.message.assistant { align-items: flex-start; }
.bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.6; word-wrap: break-word; white-space: pre-wrap; }
.message.user .bubble { background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 6px; }
.message.assistant .bubble { background: var(--ai-bg); border: 1px solid var(--ai-border); color: var(--text); border-bottom-left-radius: 6px; box-shadow: var(--shadow); }

.msg-actions { display: flex; gap: 4px; margin-top: 6px; }
.msg-action { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
.msg-action:hover { background: var(--bg-soft); color: var(--text); }
.msg-action.speaking { color: var(--accent); }
.msg-action.danger:hover { color: var(--danger); }
.msg-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; padding: 0 4px; }

.typing { display: flex; align-items: center; gap: 8px; padding: 12px 16px; color: var(--text-dim); font-size: 14px; }
.typing-dots { display: flex; gap: 4px; }
.typing-dots span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
.typing-dots span:nth-child(1) { animation-delay: 0s; }
.typing-dots span:nth-child(2) { animation-delay: 0.16s; }
.typing-dots span:nth-child(3) { animation-delay: 0.32s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

.input-area { padding: 12px 16px; background: var(--bg); border-top: 1px solid var(--border); flex-shrink: 0; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
.input-wrapper { display: flex; gap: 10px; align-items: flex-end; }
.input-field { flex: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: 20px; padding: 12px 18px; color: var(--text); font-size: 16px; font-family: inherit; resize: none; min-height: 48px; max-height: 150px; outline: none; line-height: 1.4; }
.input-field:focus { border-color: var(--accent); }
.input-field::placeholder { color: var(--text-muted); }
.send-btn { background: var(--accent); border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.send-btn svg { width: 22px; height: 22px; fill: white; }

.sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 300px; background: var(--bg); border-right: 1px solid var(--border); transform: translateX(-100%); transition: transform 0.3s ease; z-index: 100; display: flex; flex-direction: column; }
.sidebar.open { transform: translateX(0); }
.sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.sidebar-overlay.open { opacity: 1; pointer-events: auto; }
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.sidebar-header h2 { font-size: 16px; font-weight: 700; color: var(--accent); }
.new-chat-btn { background: var(--accent); color: white; border: none; width: 34px; height: 34px; border-radius: 10px; font-size: 20px; cursor: pointer; }
.chat-list { flex: 1; overflow-y: auto; padding: 8px; }
.chat-item { padding: 12px 14px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
.chat-item:hover { background: var(--bg-soft); }
.chat-item.active { background: var(--accent-soft); }
.chat-item-title { flex: 1; font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-item.active .chat-item-title { color: var(--accent); font-weight: 600; }
.chat-item-actions { display: flex; gap: 2px; }
.chat-item-btn { background: none; border: none; color: var(--text-muted); font-size: 14px; cursor: pointer; padding: 4px; opacity: 0; transition: opacity 0.15s; }
.chat-item:hover .chat-item-btn { opacity: 1; }
.chat-item-btn:hover { color: var(--text); }
.chat-item-btn.danger:hover { color: var(--danger); }
.chat-item-input { flex: 1; background: var(--bg-input); border: 1px solid var(--accent); border-radius: 6px; padding: 6px 10px; font-size: 14px; color: var(--text); outline: none; }

.sidebar-search { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.search-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 14px; color: var(--text); outline: none; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-muted); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg); border-radius: 20px 20px 0 0; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
.modal-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); }
.modal-header h3 { font-size: 17px; font-weight: 700; color: var(--accent); }
.modal-close { background: var(--bg-soft); border: 1px solid var(--border); width: 32px; height: 32px; border-radius: 8px; font-size: 18px; cursor: pointer; color: var(--text); }
.modal-body { padding: 20px; }
.field { margin-bottom: 20px; }
.field label { display: block; font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; }
.field input, .field textarea { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; color: var(--text); font-size: 15px; font-family: inherit; outline: none; }
.field input:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { min-height: 120px; resize: vertical; }
.save-btn { width: 100%; background: var(--accent); border: none; color: white; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }

.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 12px 20px; border-radius: 12px; font-size: 14px; opacity: 0; transition: opacity 0.25s; z-index: 300; pointer-events: none; }
.toast.show { opacity: 1; }

.scroll-btn { position: fixed; bottom: 90px; right: 20px; background: var(--accent); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 20px; box-shadow: var(--shadow); z-index: 50; transition: transform 0.2s; }
.scroll-btn:hover { transform: scale(1.1); }
.scroll-btn.visible { display: flex; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <span class="topbar-title">GPT</span>
    <select class="model-select" id="modelSelect" onchange="saveCurrentChat()">
      <optgroup label="OpenAI">
        <option value="openai/gpt-4o-2024-11-20">GPT-4o (Nov 2024)</option>
        <option value="openai/gpt-4.1">GPT-4.1</option>
        <option value="openai/gpt-5.1-chat">GPT-5.1 Chat</option>
      </optgroup>
      <optgroup label="Anthropic">
        <option value="anthropic/claude-sonnet-4.5">Claude Sonnet 4.5</option>
      </optgroup>
      <optgroup label="xAI">
        <option value="x-ai/grok-4">Grok 4</option>
      </optgroup>
      <optgroup label="Andere">
        <option value="deepseek/deepseek-v3.2">DeepSeek V3.2</option>
        <option value="moonshotai/kimi-k2.5">Kimi K2.5</option>
        <option value="moonshotai/kimi-k2-thinking">Kimi K2 Denken</option>
        <option value="meta-llama/llama-4-maverick">Llama 4 Maverick</option>
        <option value="qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B</option>
      </optgroup>
    </select>
    <button class="settings-btn" onclick="openSettings()">⚙️</button>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="welcome"><div class="welcome-logo">GPT</div><div class="welcome-sub">Wähle ein Modell und starte<br>eine Unterhaltung.</div></div>
  </div>
  <div class="input-area">
    <div class="input-wrapper">
      <textarea class="input-field" id="inputField" placeholder="Nachricht schreiben..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
  </div>
</div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header"><h2>Gespräche</h2><button class="new-chat-btn" onclick="newChat()">+</button></div>
  <div class="sidebar-search"><input type="text" class="search-input" id="chatSearch" placeholder="Suchen..." oninput="filterChats()"></div>
  <div class="chat-list" id="chatList"></div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header"><h3>Einstellungen</h3><button class="modal-close" onclick="closeSettings()">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>OpenRouter API-Schlüssel</label><input type="password" id="apiKeyInput" placeholder="sk-or-v1-..."></div>
      <div class="field"><label>System-Prompt</label><textarea id="systemPromptInput" placeholder="Definiere die Persönlichkeit der KI..."></textarea></div>
      <button class="save-btn" onclick="saveSettings()">Speichern</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<button class="scroll-btn" id="scrollBtn" onclick="scrollToBottom()">↓</button>
<script>
let chats = [], activeChatId = null, isStreaming = false, currentSpeakBtn = null;

function init() {
  loadState();
  if (!chats.length) newChat();
  else {
    if (!chats.find(c => c.id === activeChatId)) activeChatId = chats[0].id;
    const chat = getActiveChat();
    if (chat?.model) document.getElementById('modelSelect').value = chat.model;
    renderChatList(); renderMessages();
  }
}

function loadState() {
  try {
    const saved = localStorage.getItem('gpt_chats');
    if (saved) chats = JSON.parse(saved);
    activeChatId = localStorage.getItem('gpt_active_chat') || null;
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('gpt_chats', JSON.stringify(chats));
  localStorage.setItem('gpt_active_chat', activeChatId || '');
}

function getActiveChat() { return chats.find(c => c.id === activeChatId); }

function newChat() {
  const id = 'chat_' + Date.now();
  chats.unshift({ id, title: 'Neuer Chat', messages: [], model: document.getElementById('modelSelect').value, createdAt: Date.now(), updatedAt: Date.now() });
  activeChatId = id;
  if (document.getElementById('chatSearch')) document.getElementById('chatSearch').value = '';
  saveState(); renderChatList(); renderMessages(); closeSidebar();
  document.getElementById('inputField').focus();
}

function switchChat(id) {
  activeChatId = id;
  const chat = getActiveChat();
  if (chat?.model) document.getElementById('modelSelect').value = chat.model;
  saveState(); renderChatList(document.getElementById('chatSearch')?.value || ''); renderMessages(); closeSidebar();
}

function deleteChat(id, e) {
  e.stopPropagation();
  if (!confirm('Chat löschen?')) return;
  chats = chats.filter(c => c.id !== id);
  if (activeChatId === id) { activeChatId = chats.length ? chats[0].id : null; if (!chats.length) newChat(); }
  saveState(); renderChatList(document.getElementById('chatSearch')?.value || ''); renderMessages();
}

function saveCurrentChat() {
  const chat = getActiveChat();
  if (chat) { chat.model = document.getElementById('modelSelect').value; chat.updatedAt = Date.now(); saveState(); }
}

function renderChatList(filter = '') {
  const list = document.getElementById('chatList');
  list.innerHTML = '';
  const searchTerm = filter.toLowerCase();
  chats.forEach(chat => {
    if (searchTerm && !chat.title.toLowerCase().includes(searchTerm)) return;
    const div = document.createElement('div');
    div.className = 'chat-item' + (chat.id === activeChatId ? ' active' : '');
    div.onclick = (e) => { if (e.target === div || e.target.classList.contains('chat-item-title')) switchChat(chat.id); };
    div.innerHTML = `
      <span class="chat-item-title">${escapeHtml(chat.title)}</span>
      <div class="chat-item-actions">
        <button class="chat-item-btn" onclick="renameChat('${chat.id}', event)" title="Umbenennen">✏️</button>
        <button class="chat-item-btn danger" onclick="deleteChat('${chat.id}', event)" title="Löschen">🗑️</button>
      </div>
    `;
    list.appendChild(div);
  });
}

function filterChats() {
  const search = document.getElementById('chatSearch').value;
  renderChatList(search);
}

function renameChat(id, e) {
  e.stopPropagation();
  const chat = chats.find(c => c.id === id);
  if (!chat) return;
  
  const item = e.target.closest('.chat-item');
  const titleSpan = item.querySelector('.chat-item-title');
  const oldTitle = chat.title;
  
  // Input erstellen
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'chat-item-input';
  input.value = oldTitle;
  
  titleSpan.replaceWith(input);
  input.focus();
  input.select();
  
  const save = () => {
    const newTitle = input.value.trim() || oldTitle;
    chat.title = newTitle;
    chat.updatedAt = Date.now();
    saveState();
    renderChatList(document.getElementById('chatSearch').value);
  };
  
  input.onblur = save;
  input.onkeydown = (ev) => {
    if (ev.key === 'Enter') { ev.preventDefault(); save(); }
    if (ev.key === 'Escape') { input.value = oldTitle; save(); }
  };
}

function renderMessages() {
  const area = document.getElementById('chatArea');
  const chat = getActiveChat();
  if (!chat || !chat.messages.length) {
    area.innerHTML = '<div class="welcome"><div class="welcome-logo">GPT</div><div class="welcome-sub">Wähle ein Modell und starte<br>eine Unterhaltung.</div></div>';
    return;
  }
  area.innerHTML = '';
  chat.messages.forEach((msg, idx) => {
    const div = document.createElement('div');
    div.className = 'message ' + msg.role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = msg.content;
    div.appendChild(bubble);
    
    // Uhrzeit
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = formatTime(msg.time);
    div.appendChild(time);
    
    // Actions
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    
    // Kopieren (für alle)
    const copyBtn = document.createElement('button');
    copyBtn.className = 'msg-action';
    copyBtn.innerHTML = '📋';
    copyBtn.title = 'Kopieren';
    copyBtn.onclick = () => copyText(msg.content);
    actions.appendChild(copyBtn);
    
    if (msg.role === 'assistant') {
      // Vorlesen
      const speakBtn = document.createElement('button');
      speakBtn.className = 'msg-action';
      speakBtn.innerHTML = '🔊';
      speakBtn.title = 'Vorlesen';
      speakBtn.onclick = () => speakText(msg.content, speakBtn);
      actions.appendChild(speakBtn);
      
      // Neu generieren (nur letzte KI-Nachricht)
      if (idx === chat.messages.length - 1) {
        const regenBtn = document.createElement('button');
        regenBtn.className = 'msg-action';
        regenBtn.innerHTML = '🔄';
        regenBtn.title = 'Neu generieren';
        regenBtn.onclick = () => regenerateMessage(idx);
        actions.appendChild(regenBtn);
      }
    }
    
    if (msg.role === 'user') {
      // Bearbeiten
      const editBtn = document.createElement('button');
      editBtn.className = 'msg-action';
      editBtn.innerHTML = '✏️';
      editBtn.title = 'Bearbeiten';
      editBtn.onclick = () => editMessage(idx);
      actions.appendChild(editBtn);
    }
    
    // Löschen (für alle)
    const delBtn = document.createElement('button');
    delBtn.className = 'msg-action danger';
    delBtn.innerHTML = '🗑️';
    delBtn.title = 'Löschen';
    delBtn.onclick = () => deleteMessage(idx);
    actions.appendChild(delBtn);
    
    div.appendChild(actions);
    area.appendChild(div);
  });
  area.scrollTop = area.scrollHeight;
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  const time = d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  if (isToday) return 'Heute, ' + time;
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' }) + ', ' + time;
}

function deleteMessage(idx) {
  const chat = getActiveChat();
  if (!chat) return;
  chat.messages.splice(idx, 1);
  chat.updatedAt = Date.now();
  saveState();
  renderMessages();
}

function editMessage(idx) {
  const chat = getActiveChat();
  if (!chat) return;
  const msg = chat.messages[idx];
  
  // Text ins Eingabefeld setzen
  const input = document.getElementById('inputField');
  input.value = msg.content;
  autoResize(input);
  updateSendBtn();
  input.focus();
  
  // Alle Nachrichten ab dieser Position entfernen (inkl. dieser)
  chat.messages = chat.messages.slice(0, idx);
  chat.updatedAt = Date.now();
  saveState();
  renderMessages();
  
  showToast('Nachricht zum Bearbeiten geladen');
}

async function regenerateMessage(idx) {
  const chat = getActiveChat();
  if (!chat || isStreaming) return;
  // Entferne die letzte KI-Antwort
  chat.messages.splice(idx, 1);
  chat.updatedAt = Date.now();
  saveState();
  renderMessages();
  
  // Generiere neu
  const apiKey = localStorage.getItem('gpt_api_key');
  if (!apiKey) { showToast('Bitte API-Schlüssel eingeben'); return; }
  
  showTyping(); isStreaming = true; updateSendBtn();
  try {
    const systemPrompt = localStorage.getItem('gpt_system_prompt') || '';
    const apiMessages = [];
    if (systemPrompt) apiMessages.push({ role: 'system', content: systemPrompt });
    chat.messages.forEach(m => apiMessages.push({ role: m.role, content: m.content }));
    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ model: chat.model, messages: apiMessages })
    });
    const data = await response.json();
    hideTyping();
    const reply = data.error ? 'Fehler: ' + data.error.message : data.choices[0].message.content;
    chat.messages.push({ role: 'assistant', content: reply, time: Date.now() });
    chat.updatedAt = Date.now();
    saveState(); renderMessages();
  } catch(e) {
    hideTyping();
    chat.messages.push({ role: 'assistant', content: 'Verbindungsfehler: ' + e.message, time: Date.now() });
    saveState(); renderMessages();
  } finally { isStreaming = false; updateSendBtn(); }
}

function showTyping() {
  if (document.getElementById('typingIndicator')) return;
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.id = 'typingIndicator';
  div.className = 'message assistant';
  div.innerHTML = '<div class="typing"><div class="typing-dots"><span></span><span></span><span></span></div><span>denkt nach...</span></div>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function hideTyping() { document.getElementById('typingIndicator')?.remove(); }

async function sendMessage() {
  const input = document.getElementById('inputField');
  const text = input.value.trim();
  if (!text || isStreaming) return;
  const apiKey = localStorage.getItem('gpt_api_key');
  if (!apiKey) { showToast('Bitte API-Schlüssel eingeben'); openSettings(); return; }
  const chat = getActiveChat();
  if (!chat) return;
  chat.messages.push({ role: 'user', content: text, time: Date.now() });
  if (chat.messages.length === 1) chat.title = text.slice(0, 40) + (text.length > 40 ? '...' : '');
  chat.model = document.getElementById('modelSelect').value;
  chat.updatedAt = Date.now();
  input.value = ''; autoResize(input); updateSendBtn();
  saveState(); renderMessages(); renderChatList(document.getElementById('chatSearch')?.value || '');
  showTyping(); isStreaming = true; updateSendBtn();
  try {
    const systemPrompt = localStorage.getItem('gpt_system_prompt') || '';
    const apiMessages = [];
    if (systemPrompt) apiMessages.push({ role: 'system', content: systemPrompt });
    chat.messages.forEach(m => apiMessages.push({ role: m.role, content: m.content }));
    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ model: chat.model, messages: apiMessages })
    });
    const data = await response.json();
    hideTyping();
    const reply = data.error ? 'Fehler: ' + data.error.message : data.choices[0].message.content;
    chat.messages.push({ role: 'assistant', content: reply, time: Date.now() });
    chat.updatedAt = Date.now();
    saveState(); renderMessages();
  } catch(e) {
    hideTyping();
    chat.messages.push({ role: 'assistant', content: 'Verbindungsfehler: ' + e.message, time: Date.now() });
    saveState(); renderMessages();
  } finally { isStreaming = false; updateSendBtn(); }
}

const inputField = document.getElementById('inputField');
inputField.addEventListener('input', function() { autoResize(this); updateSendBtn(); });
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 150) + 'px'; }
function updateSendBtn() { document.getElementById('sendBtn').disabled = !inputField.value.trim() || isStreaming; }

function copyText(text) { navigator.clipboard.writeText(text).then(() => showToast('Kopiert ✓')); }

function speakText(text, btn) {
  if (currentSpeakBtn === btn && speechSynthesis.speaking) { speechSynthesis.cancel(); btn.classList.remove('speaking'); currentSpeakBtn = null; return; }
  if (speechSynthesis.speaking) { speechSynthesis.cancel(); currentSpeakBtn?.classList.remove('speaking'); }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE';
  const voices = speechSynthesis.getVoices();
  const de = voices.find(v => v.lang.startsWith('de'));
  if (de) u.voice = de;
  u.onend = () => { btn.classList.remove('speaking'); currentSpeakBtn = null; };
  btn.classList.add('speaking'); currentSpeakBtn = btn;
  speechSynthesis.speak(u);
}

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }
function openSettings() { document.getElementById('apiKeyInput').value = localStorage.getItem('gpt_api_key') || ''; document.getElementById('systemPromptInput').value = localStorage.getItem('gpt_system_prompt') || ''; document.getElementById('settingsModal').classList.add('open'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }
function saveSettings() { localStorage.setItem('gpt_api_key', document.getElementById('apiKeyInput').value.trim()); localStorage.setItem('gpt_system_prompt', document.getElementById('systemPromptInput').value); closeSettings(); showToast('Gespeichert ✓'); }

init();
speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

// Scroll-Button Logik
const chatArea = document.getElementById('chatArea');
const scrollBtn = document.getElementById('scrollBtn');

chatArea.addEventListener('scroll', () => {
  const isNearBottom = chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight < 100;
  scrollBtn.classList.toggle('visible', !isNearBottom);
});

function scrollToBottom() {
  chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
}
</script>
