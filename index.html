<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>VL Chat</title>
<style>
:root {
  --bg: #ffffff;
  --bg-soft: #f7f7f8;
  --bg-input: #ffffff;
  --text: #1a1a1a;
  --text-dim: #6e6e80;
  --accent: #e63946;
  --accent-soft: #fef2f3;
  --border: #e5e5e7;
  --user-bubble: #fef2f3;
  --ai-bubble: #f7f7f8;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}
.topbar {
  padding: 12px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.topbar h1 {
  font-size: 16px;
  color: var(--accent);
  font-weight: 700;
}
.topbar select {
  flex: 1;
  padding: 9px 12px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 13px;
  -webkit-appearance: none;
  appearance: none;
}
.settings-btn {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  color: var(--text);
  width: 38px;
  height: 38px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  -webkit-overflow-scrolling: touch;
}
.message {
  margin-bottom: 14px;
  display: flex;
  flex-direction: column;
}
.message.user { align-items: flex-end; }
.message.assistant { align-items: flex-start; }
.bubble {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-wrap: break-word;
}
.message.user .bubble {
  background: var(--user-bubble);
  border: 1px solid var(--accent);
  border-bottom-right-radius: 4px;
  color: var(--text);
}
.message.assistant .bubble {
  background: var(--ai-bubble);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text);
}
.speak-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  padding: 6px 8px;
  margin-top: 4px;
  cursor: pointer;
  border-radius: 6px;
  align-self: flex-start;
}
.speak-btn:active {
  background: var(--bg-soft);
}
.speak-btn.speaking {
  color: var(--accent);
}
.input-area {
  padding: 10px 12px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
}
.input-area textarea {
  flex: 1;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 16px;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  font-family: inherit;
  outline: none;
  line-height: 1.4;
}
.input-area textarea:focus {
  border-color: var(--accent);
}
.input-area button {
  background: var(--accent);
  border: none;
  color: white;
  width: 44px;
  height: 44px;
  border-radius: 14px;
  cursor: pointer;
  font-weight: 600;
  font-size: 20px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.input-area button:disabled { opacity: 0.4; }
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--bg);
  border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  max-height: 90dvh;
  overflow-y: auto;
  padding-bottom: env(safe-area-inset-bottom);
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}
.modal-header h3 { color: var(--accent); font-size: 17px; font-weight: 700; }
.modal-header button {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  width: 32px;
  height: 32px;
  border-radius: 8px;
}
.modal-body { padding: 20px; }
.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}
.field input, .field textarea {
  width: 100%;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  outline: none;
}
.field input:focus, .field textarea:focus {
  border-color: var(--accent);
}
.field textarea { min-height: 140px; resize: vertical; }
.save-btn {
  width: 100%;
  background: var(--accent);
  border: none;
  color: white;
  padding: 14px;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  font-size: 15px;
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>VL</h1>
    <select id="modelSelect">
      <option value="openai/gpt-4o-2024-11-20">GPT-4o (Nov 2024)</option>
      <option value="openai/gpt-4.1">GPT-4.1</option>
      <option value="qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B</option>
      <option value="deepseek/deepseek-chat">DeepSeek Chat</option>
    </select>
    <button class="settings-btn" onclick="openSettings()">⚙</button>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <textarea id="input" placeholder="Schreib hier..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Einstellungen</h3>
      <button onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>OpenRouter API-Schlüssel</label>
        <input type="password" id="apiKey" placeholder="sk-or-v1-...">
      </div>
      <div class="field">
        <label>System-Prompt</label>
        <textarea id="systemPrompt" placeholder="Hier deinen Prompt einfügen..."></textarea>
      </div>
      <button class="save-btn" onclick="saveSettings()">Speichern</button>
    </div>
  </div>
</div>

<script>
let messages = [];
let currentSpeakBtn = null;

function loadSettings() {
  const apiKey = localStorage.getItem('vl_api_key') || '';
  const systemPrompt = localStorage.getItem('vl_system_prompt') || '';
  document.getElementById('apiKey').value = apiKey;
  document.getElementById('systemPrompt').value = systemPrompt;
}

function saveSettings() {
  localStorage.setItem('vl_api_key', document.getElementById('apiKey').value);
  localStorage.setItem('vl_system_prompt', document.getElementById('systemPrompt').value);
  closeSettings();
  alert('Gespeichert ✓');
}

function openSettings() {
  loadSettings();
  document.getElementById('settingsModal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}

function speakText(text, btn) {
  if (currentSpeakBtn === btn && speechSynthesis.speaking) {
    speechSynthesis.cancel();
    btn.classList.remove('speaking');
    btn.textContent = '🔊';
    currentSpeakBtn = null;
    return;
  }
  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    if (currentSpeakBtn) {
      currentSpeakBtn.classList.remove('speaking');
      currentSpeakBtn.textContent = '🔊';
    }
  }
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'de-DE';
  utter.rate = 1.0;
  utter.pitch = 1.0;
  utter.onend = () => {
    btn.classList.remove('speaking');
    btn.textContent = '🔊';
    currentSpeakBtn = null;
  };
  utter.onerror = () => {
    btn.classList.remove('speaking');
    btn.textContent = '🔊';
    currentSpeakBtn = null;
  };
  btn.classList.add('speaking');
  btn.textContent = '⏸';
  currentSpeakBtn = btn;
  speechSynthesis.speak(utter);
}

function addMessage(role, text) {
  const chatArea = document.getElementById('chatArea');
  
  const msg = document.createElement('div');
  msg.className = 'message ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  msg.appendChild(bubble);
  
  if (role === 'assistant') {
    const speakBtn = document.createElement('button');
    speakBtn.className = 'speak-btn';
    speakBtn.textContent = '🔊';
    speakBtn.onclick = () => speakText(text, speakBtn);
    msg.appendChild(speakBtn);
  }
  
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  
  const apiKey = localStorage.getItem('vl_api_key');
  if (!apiKey) {
    alert('Bitte zuerst den API-Schlüssel in den Einstellungen eingeben.');
    return;
  }
  
  const systemPrompt = localStorage.getItem('vl_system_prompt') || '';
  const model = document.getElementById('modelSelect').value;
  
  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';
  
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.textContent = '...';
  
  try {
    const apiMessages = [];
    if (systemPrompt) apiMessages.push({ role: 'system', content: systemPrompt });
    apiMessages.push(...messages);
    
    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey,
      },
      body: JSON.stringify({
        model: model,
        messages: apiMessages,
      }),
    });
    
    const data = await response.json();
    
    if (data.error) {
      addMessage('assistant', 'Fehler: ' + data.error.message);
    } else {
      const reply = data.choices[0].message.content;
      addMessage('assistant', reply);
      messages.push({ role: 'assistant', content: reply });
    }
  } catch (e) {
    addMessage('assistant', 'Verbindungsfehler: ' + e.message);
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = '➤';
  }
}

const inputEl = document.getElementById('input');
inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
