<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>VL Chat</title>
<style>
:root {
  --bg: #ffffff;
  --bg-soft: #f7f7f8;
  --text: #1a1a1a;
  --text-dim: #6e6e80;
  --accent: #e63946;
  --accent-soft: #fef2f3;
  --border: #e5e5e7;
  --user-bubble: #fef2f3;
  --ai-bubble: #f7f7f8;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.topbar {
  padding: 12px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.menu-btn {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  width: 38px; height: 38px;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
.topbar h1 { font-size: 16px; color: var(--accent); font-weight: 700; }
.topbar select {
  flex: 1;
  padding: 9px 12px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 13px;
  -webkit-appearance: none;
  appearance: none;
}
.settings-btn {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  width: 38px; height: 38px;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
.chat-area { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
.message { margin-bottom: 16px; display: flex; flex-direction: column; }
.message.user { align-items: flex-end; }
.message.assistant { align-items: flex-start; }
.bubble {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-wrap: break-word;
}
.message.user .bubble {
  background: var(--user-bubble);
  border: 1px solid var(--accent);
  border-bottom-right-radius: 4px;
}
.message.assistant .bubble {
  background: var(--ai-bubble);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg-meta {
  display: flex;
  gap: 4px;
  align-items: center;
  margin-top: 4px;
  font-size: 11px;
  color: var(--text-dim);
}
.msg-time { padding: 0 4px; }
.msg-action {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 15px;
  padding: 4px 6px;
  cursor: pointer;
  border-radius: 6px;
}
.msg-action:active { background: var(--bg-soft); }
.msg-action.speaking { color: var(--accent); }
.input-area {
  padding: 10px 12px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
}
.input-area textarea {
  flex: 1;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 16px;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  font-family: inherit;
  outline: none;
}
.input-area textarea:focus { border-color: var(--accent); }
.send-btn {
  background: var(--accent);
  border: none;
  color: white;
  width: 44px; height: 44px;
  border-radius: 14px;
  font-size: 20px;
  cursor: pointer;
  flex-shrink: 0;
}
.send-btn:disabled { opacity: 0.4; }
.sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 280px;
  background: var(--bg);
  border-right: 1px solid var(--border);
  transform: translateX(-100%);
  transition: transform 0.25s;
  z-index: 50;
  display: flex;
  flex-direction: column;
}
.sidebar.open { transform: translateX(0); }
.sidebar-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sidebar-header h3 { color: var(--accent); font-size: 15px; font-weight: 700; }
.new-chat-btn {
  background: var(--accent);
  color: white;
  border: none;
  width: 30px; height: 30px;
  border-radius: 8px;
  font-size: 18px;
  cursor: pointer;
  font-weight: 700;
}
.chat-list { flex: 1; overflow-y: auto; padding: 8px; }
.chat-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  margin-bottom: 2px;
}
.chat-item:active, .chat-item.active { background: var(--accent-soft); }
.chat-item-title {
  flex: 1;
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-item-del {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  padding: 4px 6px;
}
.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 40;
  display: none;
}
.sidebar-overlay.open { display: block; }
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 520px;
  max-height: 90dvh;
  overflow-y: auto;
  padding-bottom: env(safe-area-inset-bottom);
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}
.modal-header h3 { color: var(--accent); font-size: 17px; font-weight: 700; }
.modal-close {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  width: 32px; height: 32px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}
.modal-body { padding: 20px; }
.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}
.field input, .field textarea {
  width: 100%;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  outline: none;
}
.field textarea { min-height: 140px; resize: vertical; }
.save-btn {
  width: 100%;
  background: var(--accent);
  border: none;
  color: white;
  padding: 14px;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  font-size: 15px;
}
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: white;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.25s;
  z-index: 200;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <h1>VL</h1>
    <select id="modelSelect" onchange="saveCurrentChat()">
      <option value="openai/gpt-4o-2024-11-20">GPT-4o (Nov 2024)</option>
      <option value="openai/gpt-4.1">GPT-4.1</option>
      <option value="openai/gpt-5.1-chat">GPT-5.1 Chat</option>
      <option value="qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B</option>
      <option value="deepseek/deepseek-chat">DeepSeek Chat</option>
    </select>
    <button class="settings-btn" onclick="openSettings()">⚙</button>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <textarea id="input" placeholder="Schreib hier..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>Meine Chats</h3>
    <button class="new-chat-btn" onclick="newChat()">+</button>
  </div>
  <div class="chat-list" id="chatList"></div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Einstellungen</h3>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>OpenRouter API-Schlüssel</label>
        <input type="password" id="apiKey" placeholder="sk-or-v1-...">
      </div>
      <div class="field">
        <label>System-Prompt</label>
        <textarea id="systemPrompt" placeholder="Hier deinen Prompt einfügen..."></textarea>
      </div>
      <button class="save-btn" onclick="saveSettings()">Speichern</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let chats = [];
let activeChatId = null;
let currentSpeakBtn = null;

function loadAll() {
  try {
    const raw = localStorage.getItem('vl_chats');
    if (raw) chats = JSON.parse(raw);
  } catch(e) {}
  activeChatId = localStorage.getItem('vl_active_chat') || null;
  if (!chats.length) newChat();
  else if (!chats.find(c => c.id === activeChatId)) activeChatId = chats[0].id;
  renderChatList();
  renderMessages();
}

function saveAll() {
  localStorage.setItem('vl_chats', JSON.stringify(chats));
  localStorage.setItem('vl_active_chat', activeChatId || '');
}

function newChat() {
  const id = 'c_' + Date.now();
  chats.unshift({ id, title: 'Neuer Chat', messages: [], model: document.getElementById('modelSelect').value, created: Date.now() });
  activeChatId = id;
  saveAll();
  renderChatList();
  renderMessages();
  closeSidebar();
}

function getActiveChat() {
  return chats.find(c => c.id === activeChatId);
}

function saveCurrentChat() {
  const chat = getActiveChat();
  if (chat) {
    chat.model = document.getElementById('modelSelect').value;
    saveAll();
  }
}

function switchChat(id) {
  activeChatId = id;
  const chat = getActiveChat();
  if (chat && chat.model) document.getElementById('modelSelect').value = chat.model;
  saveAll();
  renderChatList();
  renderMessages();
  closeSidebar();
}

function deleteChat(id, e) {
  e.stopPropagation();
  if (!confirm('Diesen Chat löschen?')) return;
  chats = chats.filter(c => c.id !== id);
  if (activeChatId === id) {
    if (chats.length) activeChatId = chats[0].id;
    else newChat();
  }
  saveAll();
  renderChatList();
  renderMessages();
}

function renderChatList() {
  const list = document.getElementById('chatList');
  list.innerHTML = '';
  chats.forEach(c => {
    const item = document.createElement('div');
    item.className = 'chat-item' + (c.id === activeChatId ? ' active' : '');
    item.onclick = () => switchChat(c.id);
    const title = document.createElement('div');
    title.className = 'chat-item-title';
    title.textContent = c.title;
    const del = document.createElement('button');
    del.className = 'chat-item-del';
    del.textContent = '✕';
    del.onclick = (e) => deleteChat(c.id, e);
    item.appendChild(title);
    item.appendChild(del);
    list.appendChild(item);
  });
}

function renderMessages() {
  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  const chat = getActiveChat();
  if (!chat) return;
  chat.messages.forEach(m => appendMessageDOM(m.role, m.content, m.time));
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function loadSettings() {
  document.getElementById('apiKey').value = localStorage.getItem('vl_api_key') || '';
  document.getElementById('systemPrompt').value = localStorage.getItem('vl_system_prompt') || '';
}

function saveSettings() {
  localStorage.setItem('vl_api_key', document.getElementById('apiKey').value);
  localStorage.setItem('vl_system_prompt', document.getElementById('systemPrompt').value);
  closeSettings();
  showToast('Gespeichert');
}

function openSettings() {
  loadSettings();
  document.getElementById('settingsModal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  const time = d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  if (isToday) return 'Heute, ' + time;
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ', ' + time;
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Kopiert ✓'));
}

function speakText(text, btn) {
  if (currentSpeakBtn === btn && speechSynthesis.speaking) {
    speechSynthesis.cancel();
    btn.classList.remove('speaking');
    btn.textContent = '🔊';
    currentSpeakBtn = null;
    return;
  }
  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    if (currentSpeakBtn) {
      currentSpeakBtn.classList.remove('speaking');
      currentSpeakBtn.textContent = '🔊';
    }
  }
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'de-DE';
  utter.onend = () => { btn.classList.remove('speaking'); btn.textContent = '🔊'; currentSpeakBtn = null; };
  utter.onerror = () => { btn.classList.remove('speaking'); btn.textContent = '🔊'; currentSpeakBtn = null; };
  btn.classList.add('speaking');
  btn.textContent = '⏸';
  currentSpeakBtn = btn;
  speechSynthesis.speak(utter);
}

function appendMessageDOM(role, text, time) {
  const area = document.getElementById('chatArea');
  const msg = document.createElement('div');
  msg.className = 'message ' + role;
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  msg.appendChild(bubble);
  
  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  
  const timeSpan = document.createElement('span');
  timeSpan.className = 'msg-time';
  timeSpan.textContent = formatTime(time || Date.now());
  meta.appendChild(timeSpan);
  
  const copyBtn = document.createElement('button');
  copyBtn.className = 'msg-action';
  copyBtn.textContent = '📋';
  copyBtn.onclick = () => copyText(text);
  meta.appendChild(copyBtn);
  
  if (role === 'assistant') {
    const speakBtn = document.createElement('button');
    speakBtn.className = 'msg-action';
    speakBtn.textContent = '🔊';
    speakBtn.onclick = () => speakText(text, speakBtn);
    meta.appendChild(speakBtn);
  }
  
  msg.appendChild(meta);
  area.appendChild(msg);
  area.scrollTop = area.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  
  const apiKey = localStorage.getItem('vl_api_key');
  if (!apiKey) { alert('Bitte zuerst API-Schlüssel in Einstellungen eingeben.'); return; }
  
  const chat = getActiveChat();
  if (!chat) return;
  
  const systemPrompt = localStorage.getItem('vl_system_prompt') || '';
  const model = document.getElementById('modelSelect').value;
  
  const userMsg = { role: 'user', content: text, time: Date.now() };
  chat.messages.push(userMsg);
  appendMessageDOM('user', text, userMsg.time);
  
  if (chat.messages.length === 1) {
    chat.title = text.slice(0, 40) + (text.length > 40 ? '...' : '');
    renderChatList();
  }
  
  input.value = '';
  input.style.height = 'auto';
  saveAll();
  
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.textContent = '...';
  
  try {
    const apiMessages = [];
    if (systemPrompt) apiMessages.push({ role: 'system', content: systemPrompt });
    chat.messages.forEach(m => apiMessages.push({ role: m.role, content: m.content }));
    
    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ model, messages: apiMessages }),
    });
    const data = await response.json();
    
    let reply;
    if (data.error) reply = 'Fehler: ' + data.error.message;
    else reply = data.choices[0].message.content;
    
    const aiMsg = { role: 'assistant', content: reply, time: Date.now() };
    chat.messages.push(aiMsg);
    appendMessageDOM('assistant', reply, aiMsg.time);
    saveAll();
  } catch (e) {
    const aiMsg = { role: 'assistant', content: 'Verbindungsfehler: ' + e.message, time: Date.now() };
    chat.messages.push(aiMsg);
    appendMessageDOM('assistant', aiMsg.content, aiMsg.time);
    saveAll();
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = '➤';
  }
}

const inputEl = document.getElementById('input');
inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

loadAll();
</script>
</body>
</html>
